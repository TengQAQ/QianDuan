<!DOCTYPE html>
<html>
    <head>
        <title>表单</title>
        <style>
            #shenqing{
                width: 100%;
                height: 100px auto;
                border-color:brown;
            }
        </style>
    </head>
    <body align="center">
        <div id="shenqing">
            <h1>申请表</h1>
            <form action="/demo/demo_form.asp">
                姓名:
                <input type="text" name="firstname" value="">
                <br>
                <br>
                受教育程度:
                <input type="radio" name="education" value="male" checked>硕士
                <input type="radio" name="education" value="female">博士
                <br>
                <br>
                性别:
                <input type="radio" name="sex" value="male" checked>男
                <input type="radio" name="sex" value="female">女
                <br>
                <br>
                月薪:
                <input type="text" name="money" value="">
                <br>
                <br>
                附注:
                <textarea name="message" rows="5" cols="30"></textarea>
                <br>
                <br>
                国籍:
                <select name="country">
                    <option value="china">china</option>
                    <option value="usa">usa</option>
                    <option value="uk">uk</option>
                    <option value="us">us</option>
                </select>
                <br>
                <br>
                <input type="Submit" value="提交">
                <input type="reset" value="重置">
                <button>提交</button>
                <button type="button" onclick="alert('又被骗了？年轻人不要走捷径哦')">一键填满</button>
            </form> 
        </div>

    </body>
</html>
